# ansible/inventory/hosts.ini

# You can point all IPs at same server. 


# ── Data tier ────────────────────────────────────────────────
[db]
# PostgreSQL — 3-node cluster (1 primary + 2 replicas).
192.168.200.106 ansible_user=<user>
#192.168.200.107 ansible_user=<user>
#192.168.200.108 ansible_user=<user>

[cache]
# Redis — co-located on the cache-proxy server.
192.168.200.100 ansible_user=<user>

[storage] # NOTE: Playbook doesn't actually make cluster atm.
192.168.200.103 ansible_user=<user>
#192.168.200.104 ansible_user=<user>
#192.168.200.105 ansible_user=<user>

# ── Application tier ─────────────────────────────────────────
[backend]
# Express API server.
192.168.200.102 ansible_user=<user>

[frontend]
# Next.js frontend server.
192.168.200.101 ansible_user=<user>

[importers]
# Python importer worker pool — 2 nodes for horizontal scaling.
# importer-3 (192.168.200.111) was repurposed as the backup HAProxy/Keepalived lb node.
192.168.200.109 ansible_user=<user>
#192.168.200.110 ansible_user=<user>

# ── Convenience grouping: all application hosts ───────────────
[app:children]
backend
frontend
importers

# ── Cache-proxy / load-balancer tier ─────────────────────────
[lb]
# Nginx caching reverse proxy + HAProxy + Keepalived + Redis.
# Two hosts: lb-1 is MASTER, lb-2 (repurposed importer-3) is BACKUP.
# Keepalived floats the VIP (192.168.200.200) to whichever host is MASTER.
192.168.200.100 ansible_user=<user>
#192.168.200.111 ansible_user=<user>

# ── Monitoring tier ───────────────────────────────────────────
[monitoring]
# Prometheus + Loki + Grafana.
192.168.200.112 ansible_user=<user>

# ── Convenience groupings ─────────────────────────────────────
[lethe:children]
db
cache
storage
app
lb
monitoring
