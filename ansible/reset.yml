# ── Redeploy application ──────────────────────────────────────
- name: Redeploy application services
  hosts: app
  gather_facts: true
  pre_tasks:
    - name: Resolve service host addresses
      ansible.builtin.include_tasks: tasks/set_service_hosts.yml
  roles:
    - role: backend
    - role: importers
    - role: frontend
    - role: nginx

# ── Summary ───────────────────────────────────────────────────
- name: Reset complete
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Print summary
      ansible.builtin.debug:
        msg: >
          Reset complete.
          Valkey flushed, MinIO bucket cleared, git repository updated,
          application services redeployed.
          PostgreSQL data was NOT modified.
