---
# roles/common/tasks/main.yml
# Install OS-level dependencies shared by all other roles.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install common system packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - build-essential
      - ca-certificates
      - gnupg
      - unzip
      - acl
      - python3-pip
      - python3-venv
    state: present
  become: true

# ── Node.js via NodeSource ────────────────────────────────────
- name: Check if Node.js is already installed
  ansible.builtin.command: node --version
  register: node_check
  changed_when: false
  failed_when: false

- name: Add NodeSource apt repository
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
  become: true
  when: node_check.rc != 0

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
  become: true
  when: node_check.rc != 0

- name: Install pm2 globally
  community.general.npm:
    name: pm2
    global: true
    state: present
  become: true


- name: Git clone repo
  ansible.builtin.git:
    repo: '{{ git_repo_url }}'
    dest: '~/lethe'

