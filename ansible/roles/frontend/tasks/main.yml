- name: Install frontend npm dependencies
  community.general.npm:
    path: "{{ lethe_root }}/frontend"
    state: present

- name: Write frontend .env.local file
  ansible.builtin.template:
    src: frontend.env.local.j2
    dest: "{{ lethe_root }}/frontend/.env.local"
    mode: '0600'
  register: frontend_env  # <-- 1. We register the state of this file

- name: Build Next.js frontend
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ lethe_root }}/frontend"
  environment:
    NEXT_PUBLIC_BACKEND_URL: "http://{{ lb_virtual_ip }}"
  # Safely check if git_pull exists before checking if it changed
  when: frontend_env.changed or (git_pull is defined and git_pull.changed)

- name: Start or Restart Next.js with pm2
  ansible.builtin.shell: >
    pm2 describe lethe-frontend > /dev/null
    && pm2 restart lethe-frontend --update-env
    || pm2 start npm --name lethe-frontend -- start --update-env
  args:
    chdir: "{{ lethe_root }}/frontend"
  # Apply the exact same safe logic here
  when: frontend_env.changed or (git_pull is defined and git_pull.changed)

- name: Save pm2 process list
  ansible.builtin.command: pm2 save
  changed_when: false