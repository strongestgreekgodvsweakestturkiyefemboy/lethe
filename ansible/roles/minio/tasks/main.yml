# -e minio_reset=true
- name: Reset MinIO cluster state 
  ansible.builtin.import_tasks: reset.yml
  when: minio_reset | default(false) | bool

- name: Create minio system user
  ansible.builtin.user:
    name: minio-user
    system: true
    shell: /usr/sbin/nologin
    create_home: true
  become: true

- name: Create MinIO data directory
  ansible.builtin.file:
    path: /var/lib/minio/data
    state: directory
    owner: minio-user
    group: minio-user
    mode: '0750'
  become: true

- name: Create MinIO config directory
  ansible.builtin.file:
    path: /etc/minio
    state: directory
    owner: minio-user
    group: minio-user
    mode: '0750'
  become: true

- name: Download MinIO binary (latest)
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-amd64/minio"
    dest: /usr/local/bin/minio
    mode: '0755'
    force: true
  become: true
  notify:
    - Reload systemd
    - Restart MinIO

- name: Write MinIO environment config
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/minio/minio.env
    owner: minio-user
    group: minio-user
    mode: '0640'
  become: true
  notify: Restart MinIO

- name: Install MinIO systemd unit
  ansible.builtin.template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart MinIO

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure MinIO directories are owned by minio-user
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: minio-user
    group: minio-user
    recurse: true
  loop:
    - /var/lib/minio
    - /etc/minio
  become: true

- name: Ensure MinIO service is started and enabled
  ansible.builtin.service:
    name: minio
    state: started
    enabled: true
  become: true


- name: Wait for MinIO API to be ready
  ansible.builtin.wait_for:
    host: "{{ minio_host }}"
    port: "{{ minio_port }}"
    timeout: 30

- name: Download MinIO client (mc, latest)
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-amd64/mc"
    dest: /usr/local/bin/mc
    mode: '0755'
  become: true

- name: Wait for MinIO cluster to reach quorum
  ansible.builtin.uri:
    url: "http://localhost:9000/minio/health/cluster" # <--- Use /cluster not just /live
    status_code: 200
  register: cluster_health
  until: cluster_health.status == 200
  retries: 60        # Give it 5 full minutes
  delay: 5

- name: Configure mc alias for local MinIO
  ansible.builtin.command: >
    mc alias set local
    http://localhost:{{ minio_port }}
    {{ minio_access_key }}
    {{ minio_secret_key }}
  register: mc_result
  until: mc_result.rc == 0
  retries: 5
  delay: 5
  changed_when: false
  run_once: true     # Cluster config only needs to happen once
  become: false      #

- name: Create lethe-imports bucket
  ansible.builtin.command: mc mb --ignore-existing local/{{ minio_bucket }}
  changed_when: false
  run_once: true  # <--- Prevents race conditions during bucket creation