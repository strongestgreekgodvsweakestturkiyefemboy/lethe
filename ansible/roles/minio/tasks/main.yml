---
# roles/minio/tasks/main.yml
# Installs MinIO server as a systemd service (no Docker required).

- name: Create minio system user
  ansible.builtin.user:
    name: minio-user
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  become: true

- name: Create MinIO data directory
  ansible.builtin.file:
    path: /var/lib/minio/data
    state: directory
    owner: minio-user
    group: minio-user
    mode: '0750'
  become: true

- name: Create MinIO config directory
  ansible.builtin.file:
    path: /etc/minio
    state: directory
    owner: minio-user
    group: minio-user
    mode: '0750'
  become: true

- name: Check if MinIO binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/minio
  register: minio_binary

- name: Download MinIO binary
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-amd64/archive/minio.{{ minio_version }}"
    dest: /usr/local/bin/minio
    mode: '0755'
  become: true
  when: not minio_binary.stat.exists

- name: Write MinIO environment config
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/minio/minio.env
    owner: minio-user
    group: minio-user
    mode: '0640'
  become: true
  notify: Restart MinIO

- name: Install MinIO systemd unit
  ansible.builtin.template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart MinIO

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure MinIO service is started and enabled
  ansible.builtin.service:
    name: minio
    state: started
    enabled: true
  become: true

- name: Wait for MinIO API to be ready
  ansible.builtin.wait_for:
    host: "{{ minio_host }}"
    port: "{{ minio_port }}"
    timeout: 30

- name: Install MinIO client (mc)
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-amd64/mc"
    dest: /usr/local/bin/mc
    mode: '0755'
  become: true

- name: Configure mc alias for local MinIO
  ansible.builtin.command: >
    mc alias set local
    http://{{ minio_host }}:{{ minio_port }}
    {{ minio_access_key }}
    {{ minio_secret_key }}
  changed_when: false

- name: Create lethe-imports bucket
  ansible.builtin.command: mc mb --ignore-existing local/{{ minio_bucket }}
  changed_when: false
