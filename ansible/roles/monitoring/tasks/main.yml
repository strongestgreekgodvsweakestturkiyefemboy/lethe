---
# roles/monitoring/tasks/main.yml
# Installs Prometheus, Loki, and Grafana on the [monitoring] host.

- name: Fail if grafana_admin_password is still the insecure default
  ansible.builtin.fail:
    msg: >
      grafana_admin_password must not be left as 'admin'.
      Set a strong password in group_vars/all.yml.
  when: grafana_admin_password == "admin"

# ── System users ─────────────────────────────────────────────
- name: Create prometheus system user
  ansible.builtin.user:
    name: prometheus
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  become: true

- name: Create loki system user
  ansible.builtin.user:
    name: loki
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  become: true

# ── Directories ───────────────────────────────────────────────
- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/prometheus
    - /var/lib/prometheus
  become: true

- name: Create Loki directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: loki
    group: loki
    mode: '0755'
  loop:
    - /etc/loki
    - /var/lib/loki
  become: true

# ── Prometheus ────────────────────────────────────────────────
- name: Check if Prometheus binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/prometheus
  register: prometheus_binary

- name: Download Prometheus archive
  ansible.builtin.get_url:
    url: >-
      https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz
    dest: /tmp/prometheus.tar.gz
    mode: '0644'
  when: not prometheus_binary.stat.exists

- name: Extract Prometheus
  ansible.builtin.unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /tmp
    remote_src: true
  when: not prometheus_binary.stat.exists

- name: Install Prometheus binaries
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: '0755'
    remote_src: true
  loop:
    - prometheus
    - promtool
  become: true
  when: not prometheus_binary.stat.exists

- name: Install Prometheus console assets
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.linux-amd64/{{ item }}"
    dest: "/etc/prometheus/{{ item }}"
    remote_src: true
    owner: prometheus
    group: prometheus
  loop:
    - consoles
    - console_libraries
  become: true
  when: not prometheus_binary.stat.exists

- name: Write Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  become: true
  notify: Restart Prometheus

- name: Install Prometheus systemd unit
  ansible.builtin.template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart Prometheus

# ── Loki ──────────────────────────────────────────────────────
- name: Check if Loki binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/loki
  register: loki_binary

- name: Download Loki binary
  ansible.builtin.get_url:
    url: >-
      https://github.com/grafana/loki/releases/download/v{{ loki_version }}/loki-linux-amd64.zip
    dest: /tmp/loki.zip
    mode: '0644'
  become: true # <--- ADD THIS
  when: not loki_binary.stat.exists

- name: Extract Loki binary
  ansible.builtin.unarchive:
    src: /tmp/loki.zip
    dest: /tmp
    remote_src: true
  become: true # <--- ALSO HIGHLY RECOMMENDED HERE
  when: not loki_binary.stat.exists

- name: Install Loki binary
  ansible.builtin.copy:
    src: /tmp/loki-linux-amd64
    dest: /usr/local/bin/loki
    mode: '0755'
    remote_src: true
  become: true
  when: not loki_binary.stat.exists

- name: Write Loki configuration
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: /etc/loki/loki-config.yml
    owner: loki
    group: loki
    mode: '0644'
  become: true
  notify: Restart Loki

- name: Install Loki systemd unit
  ansible.builtin.template:
    src: loki.service.j2
    dest: /etc/systemd/system/loki.service
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart Loki

# ── Grafana ───────────────────────────────────────────────────
- name: Set Grafana service name and config paths
  ansible.builtin.set_fact:
    grafana_service_name: "{{ 'grafana' if ansible_facts['os_family'] == 'Archlinux' else 'grafana-server' }}"
    grafana_conf_dir: "{{ '/etc' if ansible_facts['os_family'] == 'Archlinux' else '/etc/grafana' }}"
    grafana_provisioning_dir: /etc/grafana/provisioning

- name: Add Grafana apt key (Debian)
  ansible.builtin.get_url:
    url: https://apt.grafana.com/gpg.key
    dest: /etc/apt/keyrings/grafana.asc
    mode: '0644'
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Add Grafana apt repository (Debian)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main"
    state: present
    filename: grafana
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install Grafana (Debian)
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Install Grafana (Arch)
  community.general.pacman:
    name: grafana
    state: present
  become: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: Create Grafana provisioning directories (Arch)
  ansible.builtin.file:
    path: "{{ grafana_provisioning_dir }}/{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: '0750'
  loop:
    - datasources
    - dashboards
    - plugins
    - alerting
  become: true
  when: ansible_facts['os_family'] == "Archlinux"

- name: Create Grafana provisioning directories (Debian)
  ansible.builtin.file:
    path: "{{ grafana_provisioning_dir }}/{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: '0750'
  loop:
    - datasources
    - dashboards
    - plugins
    - alerting
  become: true
  when: ansible_facts['os_family'] == "Debian"

- name: Write Grafana configuration
  ansible.builtin.template:
    src: grafana.ini.j2
    dest: "{{ grafana_conf_dir }}/grafana.ini"
    owner: grafana
    group: grafana
    mode: '0640'
  become: true
  notify: Restart Grafana

- name: Write Grafana provisioning — datasources
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ grafana_provisioning_dir }}/datasources/lethe.yml"
    owner: grafana
    group: grafana
    mode: '0640'
  become: true
  notify: Restart Grafana

- name: Write Grafana provisioning — dashboard provider
  ansible.builtin.template:
    src: grafana-dashboard-provisioning.yml.j2
    dest: "{{ grafana_provisioning_dir }}/dashboards/lethe.yml"
    owner: grafana
    group: grafana
    mode: '0640'
  become: true
  notify: Restart Grafana

- name: Ensure Grafana dashboard directory exists
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: '0755'
  become: true

- name: Deploy Lethe import pipeline dashboard
  ansible.builtin.copy:
    src: lethe-import-dashboard.json
    dest: /var/lib/grafana/dashboards/lethe-import-pipeline.json
    owner: grafana
    group: grafana
    mode: '0644'
  become: true
  notify: Restart Grafana

# ── Flush and enable ──────────────────────────────────────────
- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure Prometheus is started and enabled
  ansible.builtin.service:
    name: prometheus
    state: started
    enabled: true
  become: true

- name: Ensure Loki is started and enabled
  ansible.builtin.service:
    name: loki
    state: started
    enabled: true
  become: true

- name: Ensure Grafana is started and enabled
  ansible.builtin.service:
    name: "{{ grafana_service_name }}"
    state: started
    enabled: true
  become: true
