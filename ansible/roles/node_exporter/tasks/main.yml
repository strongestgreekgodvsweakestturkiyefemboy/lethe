---
# roles/node_exporter/tasks/main.yml
# Installs Prometheus Node Exporter as a systemd service.

- name: Create node-exporter system user
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  become: true

- name: Check if node_exporter binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/node_exporter
  register: node_exporter_binary

- name: Download node_exporter archive
  ansible.builtin.get_url:
    url: >-
      https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
    dest: /tmp/node_exporter.tar.gz
    mode: '0644'
  when: not node_exporter_binary.stat.exists

- name: Extract node_exporter binary
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp
    remote_src: true
  when: not node_exporter_binary.stat.exists

- name: Install node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: true
  become: true
  when: not node_exporter_binary.stat.exists

- name: Install node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure node_exporter is started and enabled
  ansible.builtin.service:
    name: node_exporter
    state: started
    enabled: true
  become: true
