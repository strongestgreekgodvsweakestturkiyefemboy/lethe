---
# roles/promtail/tasks/main.yml
# Installs Promtail to ship logs from this host to Loki.

- name: Create promtail system user
  ansible.builtin.user:
    name: promtail
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups: adm          # allows reading system journal logs
    append: true
  become: true

- name: Create Promtail config directory
  ansible.builtin.file:
    path: /etc/promtail
    state: directory
    owner: promtail
    group: promtail
    mode: '0755'
  become: true

- name: Check if Promtail binary exists
  ansible.builtin.stat:
    path: /usr/local/bin/promtail
  register: promtail_binary

- name: Download Promtail binary
  ansible.builtin.get_url:
    url: >-
      https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip
    dest: /tmp/promtail.zip
    mode: '0644'
  when: not promtail_binary.stat.exists

- name: Extract Promtail binary
  ansible.builtin.unarchive:
    src: /tmp/promtail.zip
    dest: /tmp
    remote_src: true
  when: not promtail_binary.stat.exists

- name: Install Promtail binary
  ansible.builtin.copy:
    src: /tmp/promtail-linux-amd64
    dest: /usr/local/bin/promtail
    mode: '0755'
    remote_src: true
  become: true
  when: not promtail_binary.stat.exists

- name: Write Promtail configuration
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/promtail-config.yml
    owner: promtail
    group: promtail
    mode: '0644'
  become: true
  notify: Restart Promtail

- name: Install Promtail systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
  become: true
  notify:
    - Reload systemd
    - Restart Promtail

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Ensure Promtail is started and enabled
  ansible.builtin.service:
    name: promtail
    state: started
    enabled: true
  become: true
